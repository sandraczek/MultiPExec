<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>MultiPExec - CRDT Terminal</title>
    <style>
        html, body {
            background-color: #121212;
            color: #d4d4d4;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        #editor {
            width: 100%;
            height: 80vh;
            background: #1e1e1e;
            color: #fff;
            font-size: 16px;
            border: 1px solid #333;
            padding: 15px;
            resize: none;
            outline: none;
            border-radius: 4px;
        }
        .status {
            margin-bottom: 15px;
            color: #4af626;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="status" id="status">Status: Disconnected</div>
<textarea id="editor" disabled placeholder="Waiting for backend signal..."></textarea>
<script type="module" src="/src/main.ts"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>MultiPExec - CRDT Terminal</title>
    <style>
        html, body {
            background-color: #121212;
            color: #d4d4d4;
            font-family: monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            box-sizing: border-box;
        }

        #editor {
            width: 100%;
            height: 80vh;
            background: #1e1e1e;
            color: #fff;
            font-size: 16px;
            border: 1px solid #333;
            padding: 15px;
            resize: none;
            outline: none;
            border-radius: 4px;
        }

        .status {
            margin-bottom: 15px;
            color: #4af626;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="header">
    <div class="status" id="status">Status: Disconnected</div>
    
    <select id="language-select">
        <option value="Python">Python 3</option>
        <option value="CSharp">C# (.NET 10.0)</option>
    </select>

    <button id="btn-run" disabled>Run Code</button>
</div>

<textarea id="editor" disabled placeholder="Write your code here..."></textarea>

<div class="console-label">Terminal Output</div>
<pre id="console-output">-</pre>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
